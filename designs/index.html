<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="클라이언트와 공유할 프로젝트별 디자인 시안 목록입니다."
    />
    <title>Design Previews | Namu Dashboard</title>
    <link rel="stylesheet" href="../src/styles/base.css" />
    <link rel="stylesheet" href="../src/styles/layout.css" />
  </head>
  <body>
    <main class="shell">
      <nav class="top-nav" aria-label="페이지 이동">
        <a href="../">← 메인으로</a>
      </nav>

      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Client Design Preview</p>
        <h1 id="page-title">디자인 시안</h1>
        <p class="intro-copy">
          프로젝트별 디자인 시안, 검토 링크, 최종 전달 자료를 한곳에서 확인하는
          공유용 목록입니다.
        </p>
      </section>

      <section class="design-panel" aria-label="프로젝트별 디자인 시안">
        <div class="design-toolbar">
          <div>
            <h2>Projects</h2>
            <p>진행 중인 시안과 보관된 시안을 프로젝트 단위로 관리합니다.</p>
          </div>
          <span id="design-count" class="count-badge">0개</span>
        </div>

        <div id="design-list" class="design-list"></div>
      </section>
    </main>

    <script src="../src/data/designs.js"></script>
    <script src="../src/scripts/designs.js"></script>
  </body>
</html>
