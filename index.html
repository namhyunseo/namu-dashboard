<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="내가 굴리는 사이트와 프로젝트로 가는 개인 런처." />
    <title>Namu Dashboard</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="./src/styles/base.css?v=3" />
    <link rel="stylesheet" href="./src/styles/layout.css?v=3" />
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <div class="masthead__intro">
          <p class="eyebrow">personal launcher</p>
          <h1>Namu Dashboard</h1>
          <p class="lede">내가 굴리는 사이트와 프로젝트로 가는 한 장.</p>
        </div>

        <div class="controls">
          <input
            id="search"
            class="search"
            type="search"
            placeholder="검색…  ( / )"
            autocomplete="off"
            aria-label="링크 검색"
          />
          <div class="toggle" role="group" aria-label="공개 범위">
            <button type="button" class="toggle__btn is-active" data-view="all">전체</button>
            <button type="button" class="toggle__btn" data-view="public">공개</button>
          </div>
        </div>
      </header>

      <div id="routes" class="routes"></div>
      <p id="empty" class="empty" hidden>일치하는 링크가 없습니다.</p>

      <footer class="footer">
        <span>github-pages</span>
        <span>static</span>
        <span>namhyunseo</span>
      </footer>
    </main>

    <script src="./src/data/routes.js?v=3"></script>
    <script src="./src/scripts/app.js?v=3"></script>
  </body>
</html>
