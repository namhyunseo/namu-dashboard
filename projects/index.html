<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="진행 중인 개발 프로젝트와 팀 공유 자료를 선택하는 프로젝트 목록입니다."
    />
    <title>Projects | Namu Dashboard</title>
    <link rel="stylesheet" href="../src/styles/base.css?v=projects-2" />
    <link rel="stylesheet" href="../src/styles/layout.css?v=projects-2" />
  </head>
  <body class="dev-home detail-home">
    <main class="shell">
      <nav class="top-nav" aria-label="페이지 이동">
        <a href="../">메인으로</a>
      </nav>

      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Project Share Hub</p>
        <h1 id="page-title">프로젝트</h1>
        <p class="intro-copy">
          진행 중인 개발 프로젝트, 팀 공유 자료, 기술 문서 허브를 프로젝트 단위로
          선택해서 확인합니다.
        </p>
      </section>

      <section class="design-panel" aria-label="프로젝트 목록">
        <div class="design-toolbar">
          <div>
            <h2>Projects</h2>
            <p>공유 중인 프로젝트 자료를 선택합니다.</p>
          </div>
          <span class="count-badge">1개</span>
        </div>

        <div class="design-list">
          <article class="design-card">
            <div class="design-card-header">
              <div class="design-title-block">
                <h3>아바트립 프로젝트 자료</h3>
                <p>AVA-Trip</p>
              </div>
              <span class="design-status review">진행 중</span>
            </div>
            <p class="design-description">
              2026 관광데이터 활용 공모전 기획, 기술 문서, HTML 시각자료,
              회의 기록을 모아 둔 팀 공유 허브입니다.
            </p>
            <div class="design-meta">
              <span>업데이트 2026-05-24</span>
              <span>Next.js, FastAPI, LangGraph, PostGIS 기반 AI 여행 조율 PWA</span>
            </div>
            <a class="design-action" href="./ava-trip/">프로젝트 보기</a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
